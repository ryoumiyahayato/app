name: Apply and verify second audit fixes

on:
  pull_request:
    paths:
      - 'electronic-muyu/**'
      - '.github/agent-payload/**'
      - '.github/agent-apply.log'
      - '.github/workflows/apply-second-audit-fixes.yml'
      - '.github/workflows/verify-electronic-muyu.yml'

permissions:
  contents: write

concurrency:
  group: electronic-muyu-audit-fix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/fix-second-audit-findings'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decode and apply fixes
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cat .github/agent-payload/part* > /tmp/audit-fixes.b64
          base64 --decode /tmp/audit-fixes.b64 | gzip --decompress > /tmp/apply_audit_fixes.py
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/apply_audit_fixes.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "ROOT = Path(__file__).resolve().parents[1]",
              "ROOT = Path.cwd()"
          )
          old_helper = '''def replace_once(relative, old, new):
              path = ROOT / relative
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count < 1:
                  raise RuntimeError(f'{relative}: expected a match, found none')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          '''
          new_helper = '''def replace_once(relative, old, new):
              path = ROOT / relative
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding='utf-8')
                  return

              old_lines = old.splitlines(keepends=True)
              text_lines = text.splitlines(keepends=True)
              for index in range(0, len(text_lines) - len(old_lines) + 1):
                  candidate = text_lines[index:index + len(old_lines)]
                  if not all(
                      actual.rstrip('\\r\\n').lstrip(' \\t') == expected.rstrip('\\r\\n').lstrip(' \\t')
                      for actual, expected in zip(candidate, old_lines)
                  ):
                      continue

                  first_expected = next((line for line in old_lines if line.strip()), '')
                  first_actual = next((line for line in candidate if line.strip()), '')
                  expected_indent = len(first_expected) - len(first_expected.lstrip(' \\t'))
                  actual_indent = len(first_actual) - len(first_actual.lstrip(' \\t'))
                  delta = actual_indent - expected_indent
                  adjusted = []
                  for line in new.splitlines(keepends=True):
                      if not line.strip():
                          adjusted.append(line)
                          continue
                      if delta >= 0:
                          adjusted.append((' ' * delta) + line)
                      else:
                          leading = len(line) - len(line.lstrip(' \\t'))
                          adjusted.append(line[min(-delta, leading):])
                  text_lines[index:index + len(old_lines)] = [''.join(adjusted)]
                  path.write_text(''.join(text_lines), encoding='utf-8')
                  return

              raise RuntimeError(f'{relative}: expected a content match, found none')
          '''
          if old_helper not in source:
              raise SystemExit('patch helper template not found')
          path.write_text(source.replace(old_helper, new_helper, 1), encoding='utf-8')
          PY
          python -m py_compile /tmp/apply_audit_fixes.py > /tmp/agent-apply.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python /tmp/apply_audit_fixes.py >> /tmp/agent-apply.log 2>&1
            status=$?
          fi
          echo "exit_code=$status" >> /tmp/agent-apply.log
          exit "$status"

      - name: Record patch diagnostics
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard HEAD
          git clean -fd
          cp /tmp/agent-apply.log .github/agent-apply.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/agent-apply.log
          git commit -m 'chore: record audit patch diagnostic'
          git push origin HEAD:${{ github.head_ref }}

      - name: Stop after patch failure
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Remove temporary files and restore normal CI workflow
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/agent-payload
          rm -f .github/agent-apply.log
          rm -f .github/workflows/apply-second-audit-fixes.yml
          git fetch origin main
          git checkout origin/main -- .github/workflows/verify-electronic-muyu.yml
          git diff --check

      - name: Set up Node.js
        if: steps.apply.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            electronic-muyu/server/package-lock.json
            electronic-muyu/cloudflare-relay/package-lock.json

      - name: Verify local relay
        if: steps.apply.outcome == 'success'
        shell: bash
        working-directory: electronic-muyu/server
        run: |
          set -euo pipefail
          npm ci
          node index.js > /tmp/electronic-muyu-relay.log 2>&1 &
          relay_pid=$!
          trap 'kill "$relay_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8443/health >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl --fail --silent http://127.0.0.1:8443/health >/dev/null
          npm test
          kill "$relay_pid" 2>/dev/null || true
          wait "$relay_pid" 2>/dev/null || true
          trap - EXIT

      - name: Verify Cloudflare relay
        if: steps.apply.outcome == 'success'
        shell: bash
        working-directory: electronic-muyu/cloudflare-relay
        run: |
          set -euo pipefail
          npm ci
          npm run verify

      - name: Set up Java
        if: steps.apply.outcome == 'success'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.apply.outcome == 'success'
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        if: steps.apply.outcome == 'success'
        shell: bash
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Verify Android source
        if: steps.apply.outcome == 'success'
        shell: bash
        working-directory: electronic-muyu
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Commit repaired source to PR branch
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: address second audit findings'
          git push origin HEAD:${{ github.head_ref }}
