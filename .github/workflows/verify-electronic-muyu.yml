name: Diagnose second audit patch

on:
  pull_request:
    paths:
      - '.github/agent-payload/**'
      - '.github/workflows/verify-electronic-muyu.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/fix-second-audit-findings'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply patch and capture diagnostics
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cat .github/agent-payload/part* > /tmp/audit-fixes.b64
          base64 --decode /tmp/audit-fixes.b64 | gzip --decompress > /tmp/apply_audit_fixes.py
          python -m py_compile /tmp/apply_audit_fixes.py > .github/agent-apply.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python /tmp/apply_audit_fixes.py >> .github/agent-apply.log 2>&1
            status=$?
          fi
          echo "exit_code=$status" >> .github/agent-apply.log
          exit "$status"

      - name: Commit diagnostic log
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          cp .github/agent-apply.log /tmp/agent-apply.log
          git reset --hard HEAD
          git clean -fd
          cp /tmp/agent-apply.log .github/agent-apply.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/agent-apply.log
          git commit -m 'chore: record audit patch diagnostic'
          git push origin HEAD:${{ github.head_ref }}

      - name: Fail after recording diagnostics
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: exit 1
