name: Verify Cloudflare Relay

on:
  push:
    branches:
      - main
      - fix/z-audit-issues-20260710
    paths:
      - "electronic-muyu/cloudflare-relay/**"
      - ".github/workflows/verify-cloudflare-relay.yml"
  pull_request:
    paths:
      - "electronic-muyu/cloudflare-relay/**"
      - ".github/workflows/verify-cloudflare-relay.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electronic-muyu/cloudflare-relay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: electronic-muyu/cloudflare-relay/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Unit tests and Wrangler dry-run
        run: npm run check

      - name: Local Durable Object WebSocket integration
        id: integration
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run test:integration > integration.log 2>&1
          status=$?
          cat integration.log
          exit "$status"

      - name: Upload integration failure log
        if: steps.integration.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-integration-failure
          path: electronic-muyu/cloudflare-relay/integration.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail after integration failure
        if: steps.integration.outcome == 'failure'
        run: exit 1
