name: Verify Cloudflare Relay

on:
  workflow_dispatch:
  # Keep push verification enabled now that the repository is public.
  push:
    branches:
      - main
    paths:
      - "electronic-muyu/cloudflare-relay/**"
      - ".github/workflows/verify-cloudflare-relay.yml"
  pull_request:
    paths:
      - "electronic-muyu/cloudflare-relay/**"
      - ".github/workflows/verify-cloudflare-relay.yml"

permissions:
  contents: read

concurrency:
  group: cloudflare-relay-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: electronic-muyu/cloudflare-relay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: electronic-muyu/cloudflare-relay/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Unit tests and Wrangler dry-run
        run: npm run check

      - name: Local Durable Object WebSocket integration
        run: npm run test:integration
