name: Apply second audit fixes

on:
  push:
    branches:
      - agent/fix-second-audit-findings
    paths:
      - ".github/workflows/apply-second-audit-fixes.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-second-audit-findings
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decode and apply source fixes
        shell: bash
        run: |
          set -euo pipefail
          cat .github/agent-payload/part* > /tmp/audit-fixes.b64
          base64 --decode /tmp/audit-fixes.b64 | gzip --decompress > /tmp/apply_audit_fixes.py
          python -m py_compile /tmp/apply_audit_fixes.py
          python /tmp/apply_audit_fixes.py

      - name: Commit repaired source and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/agent-payload
          rm -f .github/workflows/apply-second-audit-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: address second audit findings"
          git push origin HEAD:agent/fix-second-audit-findings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            electronic-muyu/server/package-lock.json
            electronic-muyu/cloudflare-relay/package-lock.json

      - name: Verify local relay
        shell: bash
        working-directory: electronic-muyu/server
        run: |
          set -euo pipefail
          npm ci
          node index.js > /tmp/electronic-muyu-relay.log 2>&1 &
          relay_pid=$!
          trap 'kill "$relay_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8443/health >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl --fail --silent http://127.0.0.1:8443/health >/dev/null
          npm test
          kill "$relay_pid" 2>/dev/null || true
          wait "$relay_pid" 2>/dev/null || true
          trap - EXIT

      - name: Verify Cloudflare relay
        shell: bash
        working-directory: electronic-muyu/cloudflare-relay
        run: |
          set -euo pipefail
          npm ci
          npm run verify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify Android source
        shell: bash
        working-directory: electronic-muyu
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug
